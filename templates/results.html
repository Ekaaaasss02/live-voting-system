<!DOCTYPE html>
<html>
<head>

<title>Live Voting Results</title>

<meta http-equiv="refresh" content="3">

<style>

body{
font-family:Poppins;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
padding:40px;
}

.container{
width:60%;
margin:auto;
}

.result{
margin-bottom:25px;
}

.bar{
background:#444;
border-radius:20px;
overflow:hidden;
}

.fill{
height:25px;
background:linear-gradient(90deg,#ff758c,#ff7eb3);
animation:grow 1.5s ease-in-out;
}

@keyframes grow{
from{width:0;}
}

</style>

</head>

<body>

<div class="container">

<h1>Live Voting Results</h1>

{% set total = candidates | sum(attribute=2) %}

{% for candidate in candidates %}

<div class="result">

<p>{{ candidate[1] }} - {{ candidate[2] }} votes</p>

<div class="bar">

<div class="fill" style="width:{{ (candidate[2] / total * 100) if total > 0 else 0 }}%"></div>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
