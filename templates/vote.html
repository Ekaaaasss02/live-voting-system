<!DOCTYPE html>
<html>
<head>
<title>Vote</title>

<style>

body{
font-family: "Poppins", sans-serif;
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:15px;
width:420px;
text-align:left;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:25px;
color:#1e3c72;
}

.candidate{
display:flex;
align-items:center;
gap:10px;
padding:12px;
margin:8px 0;
border-radius:8px;
background:#f2f2f2;
font-size:18px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:30px;
font-size:18px;
color:white;
background:linear-gradient(90deg,#ff758c,#ff7eb3);
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h2>Cast Your Vote</h2>

<form action="/vote" method="POST">

<input type="hidden" name="phone" value="{{ phone }}">

{% for candidate in candidates %}

<label class="candidate">

<input type="radio" name="candidate" value="{{ candidate[0] }}" required>

{{ candidate[1] }}

</label>

{% endfor %}

<button type="submit">Submit Vote</button>

</form>

</div>

</body>
</html>
